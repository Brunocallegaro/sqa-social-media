name: CI - Testes Automatizados

on:
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Testes de caixa-branca da API (Java)
  # ─────────────────────────────────────────────
  api-unit-tests:
    name: "API - Testes Unitários (Java/Maven)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Executar testes da API (H2 in-memory)
        working-directory: ./api
        run: mvn test --no-transfer-progress

      - name: Publicar relatório de testes Java
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: api/target/surefire-reports/

  # ─────────────────────────────────────────────
  # JOB 2: Testes de caixa-branca do Client (Jest)
  # ─────────────────────────────────────────────
  client-unit-tests:
    name: "Client - Testes Unitários (Jest/React)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências do cliente
        working-directory: ./client
        run: npm ci

      - name: Executar testes unitários do cliente
        working-directory: ./client
        run: npm test -- --passWithNoTests --forceExit

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage-report
          path: client/coverage/

  # ─────────────────────────────────────────────
  # JOB 3: Testes de caixa-preta (E2E + API)
  # ─────────────────────────────────────────────
  e2e-and-api-tests:
    name: "Testes E2E e API (Playwright + Newman)"
    runs-on: ubuntu-latest
    needs: [api-unit-tests, client-unit-tests]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sqa_db
          MYSQL_USER: sqa_user
          MYSQL_PASSWORD: sqa_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      # ── Java ──
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # ── Instalar dependências do client ──
      - name: Instalar dependências do cliente
        working-directory: ./client
        run: npm ci

      # ── Build e start da API Spring Boot ──
      - name: Configurar application.properties para CI
        run: |
          cat > api/src/main/resources/application.properties << 'EOF'
          spring.application.name=demo
          spring.datasource.url=jdbc:mysql://localhost:3306/sqa_db
          spring.datasource.username=sqa_user
          spring.datasource.password=sqa_pass
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=false
          EOF

      - name: Compilar e iniciar a API em background
        working-directory: ./api
        run: |
          mvn package -DskipTests --no-transfer-progress
          nohup java -jar target/*.jar > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Aguardar API ficar disponível
        run: |
          echo "Aguardando API na porta 8080..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1 || \
               curl -sf http://localhost:8080/auth/signup -X POST -H "Content-Type: application/json" \
                 -d '{}' > /dev/null 2>&1; then
              echo "API disponível!"
              break
            fi
            echo "Tentativa $i/30..."
            sleep 5
          done

      # ── Build e start do cliente Next.js ──
      - name: Build do cliente Next.js
        working-directory: ./client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Iniciar cliente Next.js em background
        working-directory: ./client
        run: |
          nohup npm start > /tmp/client.log 2>&1 &
          echo "CLIENT_PID=$!" >> $GITHUB_ENV
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          PORT: 3000

      - name: Aguardar cliente ficar disponível
        run: |
          echo "Aguardando cliente na porta 3000..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Cliente disponível!"
              break
            fi
            echo "Tentativa $i/20..."
            sleep 5
          done

      # ── Instalar Playwright ──
      - name: Instalar dependências de teste E2E
        working-directory: ./tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # ── Executar testes E2E Playwright ──
      - name: Executar testes E2E (Playwright)
        working-directory: ./tests
        run: npx playwright test e2e/
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8080

      # ── Executar testes de API (Newman/Postman) ──
      - name: Executar testes de API (Newman)
        working-directory: ./tests
        run: npx newman run api/collection.json --env-var baseUrl=http://localhost:8080
        continue-on-error: true

      - name: Publicar relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/

      - name: Mostrar logs em caso de falha
        if: failure()
        run: |
          echo "=== API LOG ===" && cat /tmp/api.log || true
          echo "=== CLIENT LOG ===" && cat /tmp/client.log || true
